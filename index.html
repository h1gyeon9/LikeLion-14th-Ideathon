<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>페르소나 독서 토론</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- 선택 화면 -->
    <section id="select-page">
      <h1>페르소나 선택</h1>
      <p class="desc">원하는 페르소나를 선택하세요.</p>

      <div class="persona-list">
        <button class="persona-btn" data-persona="논리적 분석가">
          논리적 분석가
        </button>

        <button class="persona-btn" data-persona="지배적 정복자">
          지배적 정복자
        </button>

        <button class="persona-btn" data-persona="외교적 중재자">
          외교적 중재자
        </button>

        <button class="persona-btn" data-persona="비판적 회의론자">
          비판적 회의론자
        </button>

        <button class="persona-btn" data-persona="가치 수호자">
          가치 수호자
        </button>

        <button class="persona-btn" data-persona="커스텀">
          커스텀
        </button>
      </div>

      <div id="custom-box" class="hidden">
        <input
          type="text"
          id="custom-input"
          placeholder="예시) 감성적이고 시적인 문체로 말하는 독서가"
        />
      </div>

      <button id="start-btn">토론 시작</button>
    </section>

    <!-- 채팅 화면 -->
    <section id="chat-page" class="hidden">
      <div class="chat-header">
        <h2>독서 토론 채팅방</h2>
      </div>

      <div id="chat-container"></div>
    </section>

  </div>

  <script src="index.js"></script>
</body>
</html>
